<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>My List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 25px 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background-color: #f3f4f6;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        li:hover {
            background-color: #667eea;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>My List</h2>

        <ul>
            <li>Fatma Alaa</li>
            <li>Shahd Hesham Abdelzaher</li>
            <li>Arwa Ali Mohamed</li>
            <li>Hager Ashraf</li>
            <li>Asmaa Salah</li>
             <li>Shahd Mohamed Update</li>


             <li> Asma Salah form branch</li>
        </ul>
    </div>

</body>
</html>
